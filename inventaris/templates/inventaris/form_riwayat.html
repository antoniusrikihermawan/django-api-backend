{% extends 'inventaris/base.html' %} {% block content %}
<div class="max-w-xl mx-auto">
  <div class="bg-white rounded-xl shadow-lg p-8 border border-slate-200">
    <div class="mb-6 border-b border-slate-100 pb-4">
      <h2 class="text-2xl font-bold text-dark">Catat Transaksi</h2>
      <p class="text-slate-500 text-sm">
        Input barang masuk (restock) atau barang keluar.
      </p>
    </div>

    <form method="post" class="space-y-5">
      {% csrf_token %} {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-dark mb-2"
          >{{ field.label }}</label
        >
        <div class="relative">{{ field }}</div>
        {% if field.errors %}
        <p class="text-red-500 text-xs mt-1 font-medium">
          {{ field.errors.0 }}
        </p>
        {% endif %}
      </div>
      {% endfor %}

      <div class="flex justify-end gap-3 pt-4">
        <a
          href="{% url 'daftar_riwayat' %}"
          class="px-5 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 transition font-medium"
          >Batal</a
        >
        <button
          type="submit"
          class="bg-dark hover:bg-slate-800 text-white px-6 py-2.5 rounded-lg shadow-md transition font-medium"
        >
          Simpan Transaksi
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
