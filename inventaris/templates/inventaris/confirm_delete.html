{% extends 'inventaris/base.html' %} {% block content %}
<div class="max-w-md mx-auto mt-10">
  <div
    class="bg-white rounded-xl shadow-lg p-8 border border-slate-200 text-center"
  >
    <div
      class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6"
    >
      <svg
        class="h-8 w-8 text-red-600"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
        />
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-dark mb-2">Konfirmasi Hapus</h2>

    <p class="text-slate-500 mb-8">
      Apakah Anda yakin ingin menghapus barang <br />
      <span class="font-bold text-dark">"{{ object.nama_barang }}"</span>?
      <br />
      <span class="text-xs text-red-500"
        >Tindakan ini tidak dapat dibatalkan.</span
      >
    </p>

    <form method="post">
      {% csrf_token %}
      <div class="flex justify-center gap-3">
        <a
          href="{% url 'daftar_barang' %}"
          class="px-5 py-2.5 rounded-lg text-slate-600 bg-slate-100 hover:bg-slate-200 transition font-medium"
        >
          Batal
        </a>
        <button
          type="submit"
          class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-lg shadow-md transition font-medium"
        >
          Ya, Hapus
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
